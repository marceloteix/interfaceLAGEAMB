<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Metadados Geoespaciais</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <img src="logo.png" alt="Logo do Projeto" class="logo">
        <h1>Gerador de Metadados LAGEAMB</h1>
    </header>

   <div class="container">
    <form id="metadata-form">

    <div class="form-section">
        <h2>Informações Gerais</h2>
        <div class="form-grid">
            <div class="form-group full-width">
                <label for="filename_input">Nome do Arquivo: <span style="color: red;">*</span>
                    <span class="tooltip">?
                        <span class="tooltiptext">As 3 primeiras letras devem ser a sigla da Categoria Temática em maiúsculo, seguido de "_".<br><br>O nome do arquivo não deve conter espaços ou caracteres especiais.<br></span>
                    </span>
                </label>
                <input type="text" id="filename_input" name="filename_input" placeholder="ex: HID_nomeDoArquivo" required>
            </div>

            <div class="form-group">
                <label for="title">Título: <span style="color: red;">*</span>
                    <span class="tooltip">?
                        <span class="tooltiptext">O nome pelo qual o conjunto de dados deve ser conhecido. Ex: "Mapa de Manguezais da Baía de Guanabara".</span>
                    </span>
                </label>
                <input type="text" id="title" name="title" placeholder="Ex: Mapa de Uso e Cobertura do Solo - 2025" required>
            </div>

            <div class="form-group">
                <label for="type">Tipo de Arquivo: <span style="color: red;">*</span>
                     <span class="tooltip">?
                        <span class="tooltiptext">O formato físico do dado, como Shapefile, GeoPackage, GeoTIFF, etc.</span>
                    </span>
                </label>
                <select id="type" name="type" required>
                    <option value="GeoPackage">GeoPackage</option>
                    <option value="Shapefile">Shapefile</option>
                    <option value="GeoTIFF">GeoTIFF</option>
                    <option value="Dataset">Dataset</option>
                    <option value="Outro">Outro</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label for="abstract">Resumo (Abstract): <span style="color: red;">*</span>
                     <span class="tooltip">?
                        <span class="tooltiptext">Uma breve descrição do conteúdo do conjunto de dados, explicando o que ele representa e seu propósito.</span>
                    </span>
                </label>
                <textarea id="abstract" name="abstract" rows="4" placeholder="Descreva o conteúdo do conjunto de dados, seu propósito, a área de abrangência e a data de referência..." required></textarea>
            </div>

            <div class="form-group">
                <label for="language">Idioma: <span style="color: red;">*</span>
                     <span class="tooltip">?
                        <span class="tooltiptext">O idioma utilizado nos metadados. Use o padrão de abreviação, como PT/BR para Português do Brasil.</span>
                    </span>
                </label>
                <input type="text" id="language" name="language" value="PT/BR" required>
            </div>
            
             <div class="form-group">
                <label for="date_created">Data de Criação dos Dados: <span style="color: red;">*</span>
                     <span class="tooltip">?
                        <span class="tooltiptext">A data em que os dados foram efetivamente criados ou coletados.</span>
                    </span>
                </label>
                <input type="date" id="date_created" name="date_created" required>
            </div>
            <div class="form-group full-width">
                <label for="link_url">URL (Link): 
                     <span class="tooltip">?
                        <span class="tooltiptext">Link para acesso ao conjunto de dados (Opcional).</span>
                    </span>
                </label>
                <input type="url" id="link_url" name="link_url" placeholder="Ex: https://www.lageamb.com.br/dados/mapa.zip">
            </div>
        </div>
    </div> 
    
    <div class="form-section">
        <h2>Palavras-chave</h2>
        <div class="form-grid">
            <div class="form-group">
                <label for="keywords_gemet">Palavras-chave: <span style="color: red;">*</span>
                     <span class="tooltip">?
                        <span class="tooltiptext">Termos para descrever o dado. Use ponto e vírgula (;) para separar múltiplos termos. Ex: Manguezais; Áreas protegidas; Sensoriamento Remoto.</span>
                    </span>
                </label>
                <input type="text" id="keywords_gemet" name="keywords_gemet" placeholder="Use ponto e vírgula para separar. Ex: Manguezais; Áreas protegidas" required>
            </div>

            <div class="form-group">
                <label for="keywords_topic">Categoria Temática: <span style="color: red;">*</span>
                     <span class="tooltip">?
                        <span class="tooltiptext">Escolha uma categoria temática, conforme Manual Técnico de Gestão e Padronização de Dados Geoespaciais. Ex: Biota (BIO), Meio Ambiente (MAB), etc.</span>
                    </span>
                </label>
                <select id="keywords_topic" name="keywords_topic" required>
                    <option value="Agricultura e Pecuária (AGP)">Agricultura e Pecuária (AGP)</option>
                    <option value="Áreas Protegidas (APT)">Áreas Protegidas (APT)</option>
                    <option value="Biota (BIO)" selected>Biota (BIO)</option>
                    <option value="Climatologia, Meteorologia e Atmosfera (CLI)">Climatologia, Meteorologia e Atmosfera (CLI)</option>
                    <option value="Cultura e Lazer (LAZ)">Cultura e Lazer (LAZ)</option>
                    <option value="Economia (ECN)">Economia (ECN)</option>
                    <option value="Edificações (EDF)">Edificações (EDF)</option>
                    <option value="Educação (EDU)">Educação (EDU)</option>
                    <option value="Energia e Comunicação (ECN)">Energia e Comunicação (ECN)</option>
                    <option value="Estrutura Econômica (ECO)">Estrutura Econômica (ECO)</option>
                    <option value="Fiscalização e Denúncias (FID)">Fiscalização e Denúncias (FID)</option>
                    <option value="Habitação, Saneamento e Urbanização (HSU)">Habitação, Saneamento e Urbanização (HSU)</option>
                    <option value="Hidrografia (HID)">Hidrografia (HID)</option>
                    <option value="Imagem, Mapas Base e Cobertura de Terra (MBI)">Imagem, Mapas Base e Cobertura de Terra (MBI)</option>
                    <option value="Informação Geocientífica (IGC)">Informação Geocientífica (IGC)</option>
                    <option value="Limites e Localidades (LML)">Limites e Localidades (LML)</option>
                    <option value="Meio Ambiente (MAB)">Meio Ambiente (MAB)</option>
                    <option value="Oceanos (OCE)">Oceanos (OCE)</option>
                    <option value="Planejamento e Cadastro (PLC)">Planejamento e Cadastro (PLC)</option>
                    <option value="Pontos de Referência (PTO)">Pontos de Referência (PTO)</option>
                    <option value="Riscos (RSC)">Riscos (RSC)</option>
                    <option value="Saúde (SAU)">Saúde (SAU)</option>
                    <option value="Sociedade (SOC)">Sociedade (SOC)</option>
                    <option value="Transporte (TRA)">Transporte (TRA)</option>
                </select>
            </div>
        </div>
    </div> 
    
   <div class="form-section">
        <h2>Contato</h2>
        <div class="form-grid">
            <div class="form-group">
                <label for="contact_name">Nome do Contato: <span style="color: red;">*</span>
                     <span class="tooltip">?
                        <span class="tooltiptext">Nome da pessoa ou setor responsável pelo conjunto de dados.</span>
                    </span>
                </label>
                <input type="text" id="contact_name" name="contact_name" placeholder="Ex: Laura Beatriz" required>
            </div>
            
            <div class="form-group">
                <label for="contact_org">Organização: <span style="color: red;">*</span>
                     <span class="tooltip">?
                        <span class="tooltiptext">Nome da organização ou instituição do ponto de contato.</span>
                    </span>
                </label>
                <input type="text" id="contact_org" name="contact_org" placeholder="Ex: LAGEAMB" required>
            </div>

            <div class="form-group full-width">
                <label for="contact_email">Email: <span style="color: red;">*</span>
                     <span class="tooltip">?
                        <span class="tooltiptext">Endereço de e-mail para contato sobre o conjunto de dados.</span>
                    </span>
                </label>
                <input type="email" id="contact_email" name="contact_email" placeholder="Ex: contato@lageamb.com.br" required>
            </div>
        </div>
    </div>
    
    <div class="form-section">
        <h2>Histórico e Direitos</h2>
        <div class="form-grid">
            <div class="form-group">
                <label for="constraint_type">Tipo de Restrição: <span style="color: red;">*</span>
                     <span class="tooltip">?
                        <span class="tooltiptext">Selecione o nível de restrição aplicado ao conjunto de dados.</span>
                    </span>
                </label>
                <select id="constraint_type" name="constraint_type" required>
                    <option value="Sem restrição" selected>Sem restrições</option>
                    <option value="Restrito pela LGPD">Restrito pela LGPD</option>
                    <option value="Sigiloso pela LGPD">Sigiloso pela LGPD</option>
                    <option value="Restrito pela Lei de Seg. Nacional">Restrito pela Lei de Seg. Nacional</option>
                    <option value="Restrição do Financiador">Restrição do Financiador</option>
                    <option value="Aguardando publicação">Aguardando publicação</option>
                    <option value="Outras">Outras</option>
                </select>
            </div>

            <div class="form-group">
                <label for="constraint_desc">Descrição da Restrição: <span style="color: red;">*</span>
                     <span class="tooltip">?
                        <span class="tooltiptext">Descreva a restrição detalhadamente. Se não houver, escreva "Sem restrições".</span>
                    </span>
                </label>
                <input type="text" id="constraint_desc" name="constraint_desc" placeholder="Ex: Sem restrições" required>
            </div>

            <div class="form-group">
                <label for="license">Licença: <span style="color: red;">*</span>
                     <span class="tooltip">?
                        <span class="tooltiptext">
                            <strong>CC BY:</strong> A mais flexível. Permite alteração e uso comercial, desde que dê os créditos.<br><br>
                            <em>Caso necessite de outra licença, consulte o GT de dados do laboratório.</em>
                        </span>
                    </span>
                </label>
                <select id="license" name="license" required>
                    <option value="" disabled>Selecione uma licença</option>
                    <option value="Creative Commons Attribution 4.0" selected>Creative Commons Attribution 4.0 (CC BY)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="rights">Condição do Dado: <span style="color: red;">*</span>
                    <span class="tooltip">?
                        <span class="tooltiptext">
                            <strong>Dado Primário:</strong> Refere-se à versão inicial do conjunto de dados, quando foi gerado pela primeira vez.<br><br>
                            <strong>Dado derivado:</strong> Indica que o conjunto de dados passou por um processo de revisão, correção ou atualização.<br><br>
                            <strong>Dado Republicado:</strong> Dado que foi adquirido e republicado sem qualquer alteração.
                        </span>
                    </span>
                </label>
                <select id="rights" name="rights" required>
                    <option value="Dado Primário" selected>Dado Primário</option>
                    <option value="Dado Derivado">Dado Derivado</option>
                    <option value="Dado Republicado">Dado Republicado</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label for="history">Histórico: <span style="color: red;">*</span>
                     <span class="tooltip">?
                        <span class="tooltiptext">Descreva o processo de criação, as fontes dos dados, as transformações aplicadas e outras informações sobre a linhagem do dado.</span>
                    </span>
                </label>
                <textarea id="history" name="history" rows="4" placeholder="Descreva o processo de criação, fontes, etc." required></textarea>
            </div>

            <div class="form-group full-width">
                <label for="metadata_author">Responsável pelo Metadado: <span style="color: red;">*</span>
                     <span class="tooltip">?
                        <span class="tooltiptext">Nome do profissional responsável por preencher e gerar este arquivo de metadados.</span>
                    </span>
                </label>
                <input type="text" id="metadata_author" name="metadata_author" placeholder="Ex: Nathan Damas" required>
            </div>
        </div>
    </div>
    
    <div class="buttons">
        <button type="button" onclick="generateFile('qmd')">Gerar Arquivo .qmd</button>
        <button type="button" onclick="generateFile('xml')">Exportar como .xml</button>
    </div>
</form>
    </div>

    <script src="script.js"></script>
</body>
</html>
